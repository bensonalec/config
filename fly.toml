# fly.toml app configuration file generated for alec-devbox on 2026-05-24T20:06:07-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'alec-devbox'
primary_region = 'lax'

[build]

[[mounts]]
  source = 'devbox_data'
  destination = '/workspace'
  initial_size = '20gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'performance-2x'
